<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Just Check</title>  
  
<script src="https://js.paystack.co/v1/inline.js"></script>  
  
<style>  
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial; }  
  
body { background:#fff; color:#111; }  
  
/* NAV */  
nav {  
    display:flex;  
    justify-content:space-between;  
    padding:20px;  
    border-bottom:1px solid #eee;  
    position:sticky;  
    top:0;  
    background:#fff;  
    z-index:1000;  
}  
  
nav h2 { font-weight:700; }  
  
nav ul {  
    display:flex;  
    list-style:none;  
    gap:20px;  
}  
  
nav a { text-decoration:none; color:black; }  
  
/* HERO */  
.hero {  
    height:85vh;  
    display:flex;  
    flex-direction:column;  
    justify-content:center;  
    align-items:center;  
    background:#f6f6f6;  
    text-align:center;  
}  
  
.hero h1 { font-size:42px; margin-bottom:20px; }  
  
.hero button {  
    padding:15px 30px;  
    background:black;  
    color:white;  
    border:none;  
    cursor:pointer;  
}  
  
/* GRID */  
.products {  
    padding:50px 20px;  
}  
  
.grid {  
    display:grid;  
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));  
    gap:20px;  
}  
  
.card {  
    border:1px solid #eee;  
    padding:10px;  
    cursor:pointer;  
    transition:0.3s;  
}  
  
.card:hover { transform:scale(1.03); }  
  
.card img {  
    width:100%;  
    height:250px;  
    object-fit:cover;  
}  
  
/* CART */  
.cart {  
    position:fixed;  
    right:0;  
    top:0;  
    width:300px;  
    height:100%;  
    background:white;  
    border-left:1px solid #eee;  
    padding:20px;  
    transform:translateX(100%);  
    transition:0.3s;  
}  
  
.cart.active { transform:translateX(0); }  
  
.cart h3 { margin-bottom:20px; }  
  
.cart-item {  
    display:flex;  
    justify-content:space-between;  
    margin-bottom:10px;  
}  
  
button {  
    cursor:pointer;  
}  
  
/* MODAL */  
.modal {  
    position:fixed;  
    top:0;  
    left:0;  
    width:100%;  
    height:100%;  
    background:rgba(0,0,0,0.6);  
    display:none;  
    justify-content:center;  
    align-items:center;  
}  
  
.modal-content {  
    background:white;  
    padding:20px;  
    width:90%;  
    max-width:400px;  
}  
  
/* FOOTER */  
footer {  
    text-align:center;  
    padding:20px;  
    border-top:1px solid #eee;  
}  
</style>  
</head>  
  
<body>  
  
<nav>  
    <h2>Just Check</h2>  
    <ul>  
        <li><a href="#">Home</a></li>  
        <li><a href="#shop">Shop</a></li>  
        <li><a href="#" onclick="toggleCart()">Cart</a></li>  
    </ul>  
</nav>  
  
<section class="hero">  
    <h1>Check Your Style. Own Your Look.</h1>  
    <button onclick="scrollToShop()">Shop Now</button>  
</section>  
  
<section class="products" id="shop">  
    <div class="grid" id="productGrid"></div>  
</section>  
  
<!-- CART -->  
<div class="cart" id="cart">  
    <h3>Your Cart</h3>  
    <div id="cartItems"></div>  
    <h4>Total: ₦<span id="total">0</span></h4>  
    <button onclick="payWithPaystack()">Pay Now</button>  
    <button onclick="whatsappCheckout()">WhatsApp</button>  
</div>  
  
<!-- MODAL -->  
<div class="modal" id="modal">  
    <div class="modal-content">  
        <img id="modalImg" style="width:100%">  
        <h3 id="modalName"></h3>  
        <p id="modalPrice"></p>  
        <button onclick="addToCart()">Add to Cart</button>  
        <button onclick="closeModal()">Close</button>  
    </div>  
</div>  
  
<footer>  
    © 2026 Just Check  
</footer>  
  
<script>  
  
const products = [  
{img:"https://i.imgur.com/mCmR4ZN.jpeg", name:"Urban Tee", price:15000},  
{img:"https://i.imgur.com/U6ngVQi.jpeg", name:"Street Hoodie", price:25000},  
{img:"https://i.imgur.com/jGGN8hu.jpeg", name:"Classic Fit", price:18000},  
{img:"https://i.imgur.com/MGLaoLW.jpeg", name:"Signature Drop", price:20000},  
{img:"https://i.imgur.com/eXz7PCl.jpeg", name:"Minimal Tee", price:14000},  
{img:"https://i.imgur.com/RHhjqkf.jpeg", name:"Street Essential", price:22000},  
{img:"https://i.imgur.com/Verl1h6.jpeg", name:"Oversized Fit", price:19000},  
{img:"https://i.imgur.com/tDco6MF.jpeg", name:"Premium Drop", price:27000}  
];  
  
let cart = [];  
let selectedProduct = null;  
  
/* LOAD PRODUCTS */  
const grid = document.getElementById("productGrid");  
  
products.forEach(p => {  
    grid.innerHTML += `  
    <div class="card" onclick='openModal(${JSON.stringify(p)})'>  
        <img src="${p.img}">  
        <h4>${p.name}</h4>  
        <p>₦${p.price}</p>  
    </div>`;  
});  
  
/* MODAL */  
function openModal(p){  
    selectedProduct = p;  
    document.getElementById("modal").style.display = "flex";  
    modalImg.src = p.img;  
    modalName.innerText = p.name;  
    modalPrice.innerText = "₦" + p.price;  
}  
  
function closeModal(){  
    document.getElementById("modal").style.display = "none";  
}  
  
/* CART */  
function addToCart(){  
    cart.push(selectedProduct);  
    updateCart();  
    closeModal();  
}  
  
function updateCart(){  
    let items = document.getElementById("cartItems");  
    items.innerHTML = "";  
    let total = 0;  
  
    cart.forEach(item => {  
        total += item.price;  
        items.innerHTML += `<div class="cart-item">${item.name} - ₦${item.price}</div>`;  
    });  
  
    document.getElementById("total").innerText = total;  
}  
  
function toggleCart(){  
    document.getElementById("cart").classList.toggle("active");  
}  
  
/* PAYSTACK */  
function payWithPaystack(){  
    let total = cart.reduce((sum,i)=>sum+i.price,0);  
  
    let handler = PaystackPop.setup({  
        key: "YOUR_PAYSTACK_PUBLIC_KEY",  
        email: "customer@email.com",  
        amount: total * 100,  
        currency: "NGN",  
        callback: function(response){  
            alert("Payment successful!");  
        }  
    });  
  
    handler.openIframe();  
}  
  
/* WHATSAPP */  
function whatsappCheckout(){  
    let msg = "Hello, I want to order:\n";  
    cart.forEach(i => msg += i.name + " - ₦" + i.price + "\n");  
  
    window.open("https://wa.me/2347082448928?text=" + encodeURIComponent(msg));  
}  
  
/* SCROLL */  
function scrollToShop(){  
    document.getElementById("shop").scrollIntoView({behavior:"smooth"});  
}  
  
</script>  
  
</body>  
</html>
